openapi: 3.1.0
info:
  title: Forge Control Plane API
  version: 1.0.0
  description: Forge v1 single-node runtime convergence control plane API.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEnvelope'
  /readyz:
    get:
      summary: Readiness check
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEnvelope'
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEnvelope'
  /metrics:
    get:
      summary: Prometheus metrics
      security: []
      responses:
        '200':
          description: Prometheus text exposition
          content:
            text/plain; version=0.0.4:
              schema:
                type: string
  /api/projects:
    post:
      summary: Create or update a project registry entry
      operationId: upsertProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpsertRequest'
      responses:
        '200':
          description: Project stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProject'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      summary: List registered projects
      operationId: listProjects
      responses:
        '200':
          description: Registered projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProjectList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}:
    get:
      summary: Get one registered project
      operationId: getProject
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /deployments:
    post:
      summary: Enqueue a deployment operation
      operationId: createDeployment
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentRequest'
      responses:
        '202':
          description: Deployment accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Daemon not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /deployments/{id}:
    get:
      summary: Get deployment details
      operationId: getDeployment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deployment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentStatus'
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /logs/{id}:
    get:
      summary: Get logs for a deployment
      operationId: getDeploymentLogs
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bounded diagnostic logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentLogs'
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /events:
    get:
      summary: List events
      operationId: listEvents
      responses:
        '200':
          description: Recent events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEventList'
  /secrets:
    post:
      summary: Create or update a secret
      operationId: postSecret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretWriteRequest'
      responses:
        '201':
          description: Secret stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeSecretWriteResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Secret store unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /webhooks/github:
    post:
      summary: GitHub Webhook endpoint
      security: []
      parameters:
        - in: header
          name: X-GitHub-Delivery
          required: true
          schema:
            type: string
        - in: header
          name: X-GitHub-Event
          required: true
          schema:
            type: string
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeWebhookResult'
        '400':
          description: Invalid request or signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    HealthEnvelope:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    DeploymentRequest:
      type: object
      required:
        - project_id
        - environment
        - intent
      properties:
        project_id:
          type: string
        environment:
          type: string
          enum: [development, staging, production]
        intent:
          type: string
          enum: [deploy, redeploy, rollback]
    ProjectUpsertRequest:
      type: object
      required:
        - repo_url
        - default_branch
      properties:
        project_id:
          type:
            - string
            - 'null'
          description: Optional explicit project ID. When omitted, Forge infers it from the repository URL basename, normalizes invalid characters to hyphens, collapses duplicate hyphens, trims edge hyphens, and then validates it against the safe project ID rules.
        repo_url:
          type: string
        default_branch:
          type: string
          default: main
        base_domain:
          type:
            - string
            - 'null'
          description: Optional explicit base domain. When omitted, Forge generates and persists a stable domain using FORGE_APPS_DOMAIN, preferring `<project_id>.<FORGE_APPS_DOMAIN>` and falling back to a short suffix only on collision.
    Project:
      type: object
      required:
        - project_id
        - repo_url
        - default_branch
        - base_domain
        - domain_mode
        - created_at_unix
        - updated_at_unix
      properties:
        project_id:
          type: string
        repo_url:
          type: string
        default_branch:
          type: string
        base_domain:
          type: string
          description: Base project domain. Planned derived domains are production=`<base_domain>`, staging=`staging-<base_domain>`, development=`development-<base_domain>`.
        domain_mode:
          type: string
          enum: [generated, explicit]
        created_at_unix:
          type: integer
        updated_at_unix:
          type: integer
    ProjectList:
      type: object
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    DeploymentAccepted:
      type: object
      required:
        - deployment_id
        - queue_position
      properties:
        deployment_id:
          type: string
        queue_position:
          type: integer
    DeploymentStatus:
      type: object
      required:
        - deployment_id
        - project_id
        - environment
        - state
      properties:
        deployment_id:
          type: string
        project_id:
          type: string
        environment:
          type: string
        state:
          type: string
    DeploymentLogs:
      type: object
      required:
        - deployment_id
        - lines
      properties:
        deployment_id:
          type: string
        lines:
          type: array
          items:
            type: string
    EventList:
      type: object
      required:
        - events
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventRecord'
    EventRecord:
      type: object
      required:
        - timestamp_unix
        - project_id
        - environment
        - event_type
      properties:
        timestamp_unix:
          type: integer
          format: int64
        project_id:
          type: string
        environment:
          type: string
        generation:
          type: integer
          format: int64
          nullable: true
        deployment_id:
          type: string
          nullable: true
        event_type:
          type: string
        reason:
          type: string
          nullable: true
    SecretWriteRequest:
      type: object
      required:
        - project_id
        - environment
        - key
        - value
      properties:
        project_id:
          type: string
        environment:
          type: string
        key:
          type: string
        value:
          type: string
    SecretWriteResult:
      type: object
      required:
        - secret_id
      properties:
        secret_id:
          type: string
    WebhookResult:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [accepted, ignored]
        deployment_id:
          type: string
          nullable: true
        queue_position:
          type: integer
          nullable: true
        reason:
          type: string
          nullable: true
    SuccessEnvelopeDeploymentAccepted:
      type: object
      required: [request_id, correlation_id, data]
      properties:
        request_id: {type: string}
        correlation_id: {type: string}
        data: {$ref: '#/components/schemas/DeploymentAccepted'}
    SuccessEnvelopeProject:
      type: object
      required: [request_id, correlation_id, data]
      properties:
        request_id: {type: string}
        correlation_id: {type: string}
        data: {$ref: '#/components/schemas/Project'}
    SuccessEnvelopeProjectList:
      type: object
      required: [request_id, correlation_id, data]
      properties:
        request_id: {type: string}
        correlation_id: {type: string}
        data: {$ref: '#/components/schemas/ProjectList'}
    SuccessEnvelopeDeploymentStatus:
      type: object
      required: [request_id, correlation_id, data]
      properties:
        request_id: {type: string}
        correlation_id: {type: string}
        data: {$ref: '#/components/schemas/DeploymentStatus'}
    SuccessEnvelopeDeploymentLogs:
      type: object
      required: [request_id, correlation_id, data]
      properties:
        request_id: {type: string}
        correlation_id: {type: string}
        data: {$ref: '#/components/schemas/DeploymentLogs'}
    SuccessEnvelopeEventList:
      type: object
      required: [request_id, correlation_id, data]
      properties:
        request_id: {type: string}
        correlation_id: {type: string}
        data: {$ref: '#/components/schemas/EventList'}
    SuccessEnvelopeSecretWriteResult:
      type: object
      required: [request_id, correlation_id, data]
      properties:
        request_id: {type: string}
        correlation_id: {type: string}
        data: {$ref: '#/components/schemas/SecretWriteResult'}
    SuccessEnvelopeWebhookResult:
      type: object
      required: [request_id, correlation_id, data]
      properties:
        request_id: {type: string}
        correlation_id: {type: string}
        data: {$ref: '#/components/schemas/WebhookResult'}
    ErrorEnvelope:
      type: object
      required:
        - request_id
        - correlation_id
        - code
        - message
      properties:
        request_id:
          type: string
        correlation_id:
          type: string
        code:
          type: string
        message:
          type: string
