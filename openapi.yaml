openapi: 3.1.0
info:
  title: Forge Control Plane API
  version: 1.0.0
  description: Forge v1 single-node runtime convergence control plane API.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: Health check
      description: Lightweight process liveness only. Verifies the daemon is running and responding.
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEnvelope'
  /readyz:
    get:
      summary: Readiness check
      description: Cache-backed control-plane readiness. Serves cached convergence state and must remain bounded-time. Not intended for fleet diagnostics or per-project health inspection.
      security: []
      responses:
        '200':
          description: Ready or degraded control-plane readiness
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessEnvelope'
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessEnvelope'
  /metrics:
    get:
      summary: Prometheus metrics
      security: []
      responses:
        '200':
          description: Prometheus text exposition
          content:
            text/plain; version=0.0.4:
              schema:
                type: string
  /api/projects:
    post:
      summary: Create or update a project registry entry
      operationId: upsertProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpsertRequest'
      responses:
        '200':
          description: Project stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProject'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      summary: List registered projects
      operationId: listProjects
      responses:
        '200':
          description: Registered projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProjectList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}:
    get:
      summary: Get one registered project
      operationId: getProject
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/environments/{environment}/status:
    get:
      summary: Get runtime status for one project environment
      operationId: getProjectEnvironmentStatus
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Environment runtime status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProjectEnvironmentStatus'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project or environment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/environments/{environment}/diagnostics:
    get:
      summary: Get diagnostics for one project environment
      operationId: getProjectEnvironmentDiagnostics
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Environment diagnostics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEnvironmentDiagnostics'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project or environment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/environments/{environment}/backups:
    post:
      summary: Create a crash-consistent backup for the active generation
      operationId: createBackup
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupRecord'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Active generation or persistent volume not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      summary: List backups for one project environment
      operationId: listBackups
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/backups/{backup_id}:
    get:
      summary: Inspect one backup manifest
      operationId: inspectBackup
      parameters:
        - in: path
          name: backup_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupRecord'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/backups/{backup_id}/restore:
    post:
      summary: Restore a backup into a new generation
      operationId: restoreBackup
      parameters:
        - in: path
          name: backup_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup restored into a new generation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupRestore'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /deployments:
    post:
      summary: Enqueue a deployment operation
      operationId: createDeployment
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentRequest'
      responses:
        '202':
          description: Deployment accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Daemon not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /deployments/{id}:
    get:
      summary: Get deployment details
      operationId: getDeployment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deployment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentStatus'
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /logs/{id}:
    get:
      summary: Get logs for a deployment
      operationId: getDeploymentLogs
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bounded diagnostic logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentLogs'
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /events:
    get:
      summary: List events
      operationId: listEvents
      responses:
        '200':
          description: Recent events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEventList'
  /secrets:
    post:
      summary: Create or update a secret
      operationId: postSecret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretWriteRequest'
      responses:
        '201':
          description: Secret stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeSecretWriteResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Secret store unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /webhooks/github:
    post:
      summary: GitHub Webhook endpoint
      security: []
      parameters:
        - in: header
          name: X-GitHub-Delivery
          required: true
          schema:
            type: string
        - in: header
          name: X-GitHub-Event
          required: true
          schema:
            type: string
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeWebhookResult'
        '400':
          description: Invalid request or signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    HealthEnvelope:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    ReadinessEnvelope:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ready
          description: Control-plane readiness status. Common values are ready, degraded, and not_ready.
        reason:
          type:
            - string
            - 'null'
          example: readiness cache stale
        reasons:
          type: array
          items:
            $ref: '#/components/schemas/ReadyzReason'
    ReadyzReason:
      type: object
      required:
        - project_id
        - environment
        - source
        - marker
        - message
      properties:
        project_id:
          type: string
        environment:
          type: string
        generation:
          type:
            - integer
            - 'null'
          format: int64
        source:
          type: string
        marker:
          type: string
        message:
          type: string
    DeploymentRequest:
      type: object
      required:
        - project_id
        - environment
        - intent
      properties:
        project_id:
          type: string
        environment:
          type: string
          enum: [development, staging, production]
        intent:
          type: string
          enum: [deploy, redeploy, rollback]
        source_path:
          type:
            - string
            - 'null'
          description: Optional explicit local source checkout path on the daemon host. Mutually exclusive with `source_ref`.
        source_ref:
          type:
            - string
            - 'null'
          description: Optional Git ref to resolve from the registered project repository. When omitted for deploy intents, Forge uses the project's `default_branch`. Mutually exclusive with `source_path`.
    ProjectUpsertRequest:
      type: object
      required:
        - repo_url
        - default_branch
      properties:
        project_id:
          type:
            - string
            - 'null'
          description: Optional explicit project ID. When omitted, Forge infers it from the repository URL basename, normalizes invalid characters to hyphens, collapses duplicate hyphens, trims edge hyphens, and then validates it against the safe project ID rules.
        repo_url:
          type: string
        default_branch:
          type: string
          default: main
        base_domain:
          type:
            - string
            - 'null'
          description: Optional explicit base domain. When omitted, Forge generates and persists a stable domain using FORGE_APPS_DOMAIN, preferring `<project_id>.<FORGE_APPS_DOMAIN>` and falling back to a short suffix only on collision.
    Project:
      type: object
      required:
        - project_id
        - repo_url
        - default_branch
        - base_domain
        - domain_mode
        - created_at_unix
        - updated_at_unix
      properties:
        project_id:
          type: string
        repo_url:
          type: string
        default_branch:
          type: string
        base_domain:
          type: string
          description: Base project domain. Planned derived domains are production=`<base_domain>`, staging=`staging-<base_domain>`, development=`development-<base_domain>`.
        domain_mode:
          type: string
          enum: [generated, explicit]
        created_at_unix:
          type: integer
        updated_at_unix:
          type: integer
    ProjectList:
      type: object
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    DeploymentAccepted:
      type: object
      required:
        - deployment_id
        - queue_position
      properties:
        deployment_id:
          type: string
        queue_position:
          type: integer
    DeploymentStatus:
      type: object
      required:
        - deployment_id
        - project_id
        - environment
        - state
      properties:
        deployment_id:
          type: string
        project_id:
          type: string
        environment:
          type: string
        state:
          type: string
    DeploymentLogs:
      type: object
      required:
        - deployment_id
        - lines
      properties:
        deployment_id:
          type: string
        lines:
          type: array
          items:
            type: string
    PersistedRuntimePolicy:
      type: object
      required:
        - restart_policy
      properties:
        cpu_limit:
          type: string
          nullable: true
        memory_limit_mb:
          type: integer
          format: int64
          nullable: true
        restart_policy:
          type: string
        max_retries:
          type: integer
          format: int64
          nullable: true
    PersistedRuntimeUsageSnapshot:
      type: object
      required:
        - captured_at_unix
      properties:
        captured_at_unix:
          type: integer
          format: int64
        cpu_percent:
          type: string
          nullable: true
        memory_usage_mb:
          type: integer
          format: int64
          nullable: true
        memory_limit_mb:
          type: integer
          format: int64
          nullable: true
    PersistedTerminationInfo:
      type: object
      required:
        - oom_killed
        - restart_count
      properties:
        oom_killed:
          type: boolean
        exit_code:
          type: integer
          format: int32
          nullable: true
        last_exit_code:
          type: integer
          format: int32
          nullable: true
        exit_signal:
          type: integer
          format: int32
          nullable: true
        reason:
          type: string
          nullable: true
        termination_reason:
          type: string
          nullable: true
        restart_count:
          type: integer
          format: int64
    PersistedServiceState:
      type: string
      enum: [queued, building, starting, warming, validating, unstable, crash_loop, oom_killed, healthy, failed]
    DeploymentLifecycleState:
      type: string
      enum: [queued, building, starting, warming, validating, unstable, crash_loop, oom_killed, promoted, rollback, failed, gc_eligible]
    PersistedValidationSummary:
      type: object
      properties:
        restart_count_initial: { type: integer, format: int64 }
        restart_count_current: { type: integer, format: int64 }
        restart_count_stable: { type: boolean }
        validation_succeeded: { type: boolean }
        last_probe_error:
          type: string
          nullable: true
        unstable_probe_failures: { type: integer, format: int32 }
        restart_storm_detected: { type: boolean }
        oom_detected: { type: boolean }
    PersistedPromotionSummary:
      type: object
      properties:
        warmup_succeeded: { type: boolean }
        validation_succeeded: { type: boolean }
        route_verification_succeeded: { type: boolean }
        runtime_snapshot_persisted: { type: boolean }
        convergence_target_stable: { type: boolean }
        promoted_at_unix:
          type: integer
          format: int64
          nullable: true
        gate_reason:
          type: string
          nullable: true
    RetentionRole:
      type: string
      enum: [current, rollback_target, retained, gc_eligible]
    ServiceRuntimeStatus:
      type: object
      required:
        - service_id
        - role
        - depends_on
        - dns_aliases
        - running
        - runtime_policy
        - restart_count
        - route
        - health
      properties:
        service_id: { type: string }
        role: { type: string }
        depends_on:
          type: array
          items: { type: string }
        dns_aliases:
          type: array
          items: { type: string }
        container_name:
          type: string
          nullable: true
        image_ref:
          type: string
          nullable: true
        running: { type: boolean }
        state_status:
          type: string
          nullable: true
        lifecycle_state:
          allOf:
            - $ref: '#/components/schemas/PersistedServiceState'
          nullable: true
        runtime_policy:
          $ref: '#/components/schemas/PersistedRuntimePolicy'
        runtime_usage:
          allOf:
            - $ref: '#/components/schemas/PersistedRuntimeUsageSnapshot'
          nullable: true
        termination:
          allOf:
            - $ref: '#/components/schemas/PersistedTerminationInfo'
          nullable: true
        restart_count:
          type: integer
          format: int64
        last_exit_code:
          type: integer
          format: int32
          nullable: true
        route: { type: string }
        health: { type: string }
        failure_reason:
          type: string
          nullable: true
    ProjectEnvironmentStatus:
      type: object
      required:
        - project_id
        - environment
        - status
        - domain
        - container_running
        - route_active
        - runtime_policy
        - restart_count
        - startup_order
        - services
      properties:
        project_id: { type: string }
        environment: { type: string }
        status: { type: string }
        active_generation:
          type: integer
          format: int64
          nullable: true
        domain: { type: string }
        container_name:
          type: string
          nullable: true
        container_running: { type: boolean }
        container_status:
          type: string
          nullable: true
        image_ref:
          type: string
          nullable: true
        runtime_policy:
          $ref: '#/components/schemas/PersistedRuntimePolicy'
        runtime_usage:
          allOf:
            - $ref: '#/components/schemas/PersistedRuntimeUsageSnapshot'
          nullable: true
        termination:
          allOf:
            - $ref: '#/components/schemas/PersistedTerminationInfo'
          nullable: true
        restart_count:
          type: integer
          format: int64
        startup_order:
          type: array
          items:
            type: string
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceRuntimeStatus'
        lifecycle_state:
          allOf:
            - $ref: '#/components/schemas/DeploymentLifecycleState'
          nullable: true
        validation_summary:
          allOf:
            - $ref: '#/components/schemas/PersistedValidationSummary'
          nullable: true
        promotion_summary:
          allOf:
            - $ref: '#/components/schemas/PersistedPromotionSummary'
          nullable: true
    EnvironmentDiagnostics:
      type: object
      required:
        - project_id
        - environment
        - status
        - services
        - restart_instability
        - probe_flapping
      properties:
        project_id: { type: string }
        environment: { type: string }
        status: { type: string }
        active_generation:
          type: integer
          format: int64
          nullable: true
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceRuntimeStatus'
        active_lifecycle_state:
          allOf:
            - $ref: '#/components/schemas/DeploymentLifecycleState'
          nullable: true
        validation_summary:
          allOf:
            - $ref: '#/components/schemas/PersistedValidationSummary'
          nullable: true
        promotion_summary:
          allOf:
            - $ref: '#/components/schemas/PersistedPromotionSummary'
          nullable: true
        promotion_gate_reason:
          type: string
          nullable: true
        warmup_failure_summary:
          type: string
          nullable: true
        restart_instability:
          type: boolean
        probe_flapping:
          type: boolean
    BackupVolumeRecord:
      type: object
      required:
        - volume_id
        - docker_volume_name
        - service_id
        - mount_path
        - archive_file
        - archive_size_bytes
        - archive_sha256
      properties:
        volume_id:
          type: string
        docker_volume_name:
          type: string
        service_id:
          type: string
        mount_path:
          type: string
        archive_file:
          type: string
        archive_size_bytes:
          type: integer
          format: int64
        archive_sha256:
          type: string
    RestoreRecord:
      type: object
      required:
        - restored_generation
        - restored_deployment_id
        - restored_at_unix
        - status
      properties:
        restored_generation:
          type: integer
          format: int64
        restored_deployment_id:
          type: string
        restored_at_unix:
          type: integer
          format: int64
        status:
          type: string
    BackupRecord:
      type: object
      required:
        - backup_id
        - project_id
        - environment
        - created_at_unix
        - source_generation
      properties:
        backup_id:
          type: string
        project_id:
          type: string
        environment:
          type: string
        created_at_unix:
          type: integer
          format: int64
        source_generation:
          type: integer
          format: int64
        source_deployment_id:
          type: string
          nullable: true
        services:
          type: array
          items:
            type: string
        volumes:
          type: array
          items:
            $ref: '#/components/schemas/BackupVolumeRecord'
        restores:
          type: array
          items:
            $ref: '#/components/schemas/RestoreRecord'
    BackupList:
      type: object
      required:
        - project_id
        - environment
        - backups
      properties:
        project_id:
          type: string
        environment:
          type: string
        backups:
          type: array
          items:
            $ref: '#/components/schemas/BackupRecord'
    BackupRestoreResponse:
      type: object
      required:
        - backup_id
        - restored_generation
        - restored_deployment_id
        - restored_at_unix
      properties:
        backup_id:
          type: string
        restored_generation:
          type: integer
          format: int64
        restored_deployment_id:
          type: string
        restored_at_unix:
          type: integer
          format: int64
    EventList:
      type: object
      required:
        - events
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventRecord'
    EventRecord:
      type: object
      required:
        - timestamp_unix
        - project_id
        - environment
        - event_type
      properties:
        timestamp_unix:
          type: integer
          format: int64
        project_id:
          type: string
        environment:
          type: string
