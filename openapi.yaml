openapi: 3.1.0
info:
  title: Forge Control Plane API
  version: 1.0.0
  description: Forge v1 single-node runtime convergence control plane API.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/tokens:
    get:
      summary: List CLI tokens visible to the authenticated principal
      description: Returns token metadata only. Plaintext token values are never returned.
      responses:
        '200':
          description: CLI token metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeTokenList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      summary: Create a new CLI token
      description: Issues a new CLI token signed with the current secret. The plaintext token is shown once in the response and is not stored server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenCreateRequest'
      responses:
        '200':
          description: Token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeTokenCreate'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/tokens/{token_id}:
    delete:
      summary: Revoke one CLI token
      parameters:
        - in: path
          name: token_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeTokenRevoke'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /healthz:
    get:
      summary: Health check
      description: Lightweight process liveness only. Verifies the daemon is running and responding.
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEnvelope'
  /readyz:
    get:
      summary: Readiness check
      description: Cache-backed control-plane readiness. Serves cached convergence state, startup phase, and degraded reasons in bounded time. It must not perform fleet scans, replay execution, or per-project health inspection on the request path.
      security: []
      responses:
        '200':
          description: Ready or degraded control-plane readiness
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessEnvelope'
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessEnvelope'
  /metrics:
    get:
      summary: Cached control-plane metrics
      description: Cache-backed JSON control-plane telemetry including startup phase, leadership, replay, cache age, dependency breaker, and split-brain detection fields. Request handling is bounded-time and does not trigger live Docker or Caddy scans.
      security: []
      responses:
        '200':
          description: Metrics JSON snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSnapshot'
  /api/projects:
    post:
      summary: Create or update a project registry entry
      operationId: upsertProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpsertRequest'
      responses:
        '200':
          description: Project stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProject'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      summary: List registered projects
      operationId: listProjects
      responses:
        '200':
          description: Registered projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProjectList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}:
    get:
      summary: Get one registered project
      operationId: getProject
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/env:
    get:
      summary: Get masked environment inventory across development, staging, and production
      operationId: getProjectEnvInventory
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Masked environment inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEnvInventory'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/env/{environment}:
    get:
      summary: Get masked environment inventory for one environment
      operationId: getProjectEnvInventoryEnvironment
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Masked environment inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEnvInventory'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project or environment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/env/preview:
    post:
      summary: Preview masked environment changes without saving them
      operationId: postProjectEnvPreview
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvPreviewRequest'
      responses:
        '200':
          description: Preview-only masked environment diff
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEnvPreview'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/environments/{environment}/status:
    get:
      summary: Get runtime status for one project environment
      operationId: getProjectEnvironmentStatus
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Environment runtime status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProjectEnvironmentStatus'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project or environment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/environments/{environment}/diagnostics:
    get:
      summary: Get diagnostics for one project environment
      operationId: getProjectEnvironmentDiagnostics
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Environment diagnostics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEnvironmentDiagnostics'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project or environment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/environments/{environment}/backups:
    post:
      summary: Create a crash-consistent backup for the active generation
      operationId: createBackup
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupRecord'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Active generation or persistent volume not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      summary: List backups for one project environment
      operationId: listBackups
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/backups/{backup_id}:
    get:
      summary: Inspect one backup manifest
      operationId: inspectBackup
      parameters:
        - in: path
          name: backup_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupRecord'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/backups/{backup_id}/restore:
    post:
      summary: Restore a backup into a new generation
      operationId: restoreBackup
      parameters:
        - in: path
          name: backup_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup restored into a new generation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupRestore'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /deployments:
    post:
      summary: Enqueue a deployment operation
      operationId: createDeployment
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentRequest'
      responses:
        '202':
          description: Deployment accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Daemon not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /deployments/{id}:
    get:
      summary: Get deployment details
      operationId: getDeployment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deployment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentStatus'
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /logs/{id}:
    get:
      summary: Get logs for a deployment
      operationId: getDeploymentLogs
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bounded diagnostic logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentLogs'
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /events:
    get:
      summary: List events
      operationId: listEvents
      responses:
        '200':
          description: Recent events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEventList'
  /secrets:
    post:
      summary: Create or update a secret
      operationId: postSecret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretWriteRequest'
      responses:
        '201':
          description: Secret stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeSecretWriteResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Secret store unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /webhooks/github:
    post:
      summary: GitHub Webhook endpoint
      security: []
      parameters:
        - in: header
          name: X-GitHub-Delivery
          required: true
          schema:
            type: string
        - in: header
          name: X-GitHub-Event
          required: true
          schema:
            type: string
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeWebhookResult'
        '400':
          description: Invalid request or signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    HealthEnvelope:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    ReadinessEnvelope:
      type: object
      required:
        - status
        - startup_phase
      properties:
        status:
          type: string
          example: ready
          description: Control-plane readiness status. Common values are ready, degraded, and not_ready.
        startup_phase:
          type: string
          example: leader_active
          description: Current daemon startup phase. Values are booting, replaying, leader_acquiring, follower, leader_active, or degraded.
        active_failure:
          type: boolean
          description: True when the current cached readiness state has an active unresolved blocker.
        reason:
          type:
            - string
            - 'null'
          example: readiness cache stale
        reasons:
          type: array
          items:
            $ref: '#/components/schemas/ReadyzReason'
    DependencyBreakerDiagnostics:
      type: object
      properties:
        state:
          type: string
        failure_count:
          type: integer
          format: int64
        last_success_unix:
          type:
            - integer
            - 'null'
          format: int64
        next_retry_unix:
          type:
            - integer
            - 'null'
          format: int64
        last_error:
          type:
            - string
            - 'null'
    MetricsDependencySnapshot:
      type: object
      properties:
        probe_latency_ms:
          type: integer
          format: int64
        breaker:
          $ref: '#/components/schemas/DependencyBreakerDiagnostics'
    ClusterDiagnostics:
      type: object
      properties:
        observed_nodes:
          type: integer
        active_reconcilers:
          type: integer
        lease_epoch_divergence:
          type: boolean
        split_brain_suspected:
          type: boolean
        multiple_active_reconcilers:
          type: boolean
        checkpoint_owner_mismatch:
          type: boolean
        snapshot_owner_mismatch:
          type: boolean
        local_role:
          type: string
        heartbeat_age_ms:
          type: integer
          format: int64
    MetricsSnapshot:
      type: object
      required:
        - readiness_status
        - startup_phase
        - leader
        - follower_mode
        - reconciliation_enabled
        - replay_in_progress
        - lease_epoch
        - readiness_cache_age_ms
      properties:
        readiness_status:
          type: string
          description: Active control-plane readiness state. Historical convergence counters do not change this field without an unresolved current blocker.
        readiness_reason:
          type:
            - string
            - 'null'
          description: Summary reason for the current active readiness state when degraded.
        startup_phase:
          type: string
        convergence_active_failure:
          type: boolean
        convergence_active_failure_reason:
          type:
            - string
            - 'null'
        convergence_last_failure_historical_unix:
          type:
            - integer
            - 'null'
          format: int64
        leader:
          type: boolean
        follower_mode:
          type: boolean
        reconciliation_enabled:
          type: boolean
        replay_in_progress:
          type: boolean
        lease_epoch:
          type: integer
          format: int64
        readiness_cache_age_ms:
          type: integer
          format: int64
        convergence_loop_duration_ms:
          type: integer
          format: int64
        queue_depth:
          type: integer
        pending_intents:
          type: integer
        replay_queue_depth:
          type: integer
        replay_paused:
          type: boolean
        replay_quarantined_total:
          type: integer
          format: int64
        docker:
          $ref: '#/components/schemas/MetricsDependencySnapshot'
        caddy:
          $ref: '#/components/schemas/MetricsDependencySnapshot'
        cluster:
          $ref: '#/components/schemas/ClusterDiagnostics'
    ReadyzReason:
      type: object
      required:
        - project_id
        - environment
        - source
        - marker
        - message
      properties:
        project_id:
          type: string
        environment:
          type: string
        generation:
          type:
            - integer
            - 'null'
          format: int64
        source:
          type: string
        marker:
          type: string
        message:
          type: string
    DeploymentRequest:
      type: object
      required:
        - project_id
        - environment
        - intent
      properties:
        project_id:
          type: string
        environment:
          type: string
          enum: [development, staging, production]
        intent:
          type: string
          enum: [deploy, redeploy, rollback]
        source_path:
          type:
            - string
            - 'null'
          description: Optional explicit local source checkout path on the daemon host. Mutually exclusive with `source_ref`.
        source_ref:
          type:
            - string
            - 'null'
          description: Optional Git ref to resolve from the registered project repository. When omitted for deploy intents, Forge uses the project's `default_branch`. Mutually exclusive with `source_path`.
    ProjectUpsertRequest:
      type: object
      required:
        - repo_url
        - default_branch
      properties:
        project_id:
          type:
            - string
            - 'null'
          description: Optional explicit project ID. When omitted, Forge infers it from the repository URL basename, normalizes invalid characters to hyphens, collapses duplicate hyphens, trims edge hyphens, and then validates it against the safe project ID rules.
        repo_url:
          type: string
        default_branch:
          type: string
          default: main
        base_domain:
          type:
            - string
            - 'null'
          description: Optional explicit base domain. When omitted, Forge generates and persists a stable domain using FORGE_APPS_DOMAIN, preferring `<project_id>.<FORGE_APPS_DOMAIN>` and falling back to a short suffix only on collision.
    Project:
      type: object
      required:
        - project_id
        - repo_url
        - default_branch
        - base_domain
        - domain_mode
        - created_at_unix
        - updated_at_unix
      properties:
        project_id:
          type: string
        repo_url:
          type: string
        default_branch:
          type: string
        base_domain:
          type: string
          description: Base project domain. Planned derived domains are production=`<base_domain>`, staging=`staging-<base_domain>`, development=`development-<base_domain>`.
        domain_mode:
          type: string
          enum: [generated, explicit]
        created_at_unix:
          type: integer
        updated_at_unix:
          type: integer
    ProjectList:
      type: object
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    DeploymentAccepted:
      type: object
      required:
        - deployment_id
        - queue_position
      properties:
        deployment_id:
          type: string
        queue_position:
          type: integer
    DeploymentStatus:
      type: object
      required:
        - deployment_id
        - project_id
        - environment
        - state
      properties:
        deployment_id:
          type: string
        project_id:
          type: string
        environment:
          type: string
        state:
          type: string
    DeploymentLogs:
      type: object
      required:
        - deployment_id
        - lines
      properties:
        deployment_id:
          type: string
        lines:
          type: array
          items:
            type: string
    PersistedRuntimePolicy:
      type: object
      required:
        - restart_policy
      properties:
        cpu_limit:
          type: string
          nullable: true
        memory_limit_mb:
          type: integer
          format: int64
          nullable: true
        restart_policy:
          type: string
        max_retries:
          type: integer
          format: int64
          nullable: true
    PersistedRuntimeUsageSnapshot:
      type: object
      required:
        - captured_at_unix
      properties:
        captured_at_unix:
          type: integer
          format: int64
        cpu_percent:
          type: string
          nullable: true
        memory_usage_mb:
          type: integer
          format: int64
          nullable: true
        memory_limit_mb:
          type: integer
          format: int64
          nullable: true
    PersistedTerminationInfo:
      type: object
      required:
        - oom_killed
        - restart_count
      properties:
        oom_killed:
          type: boolean
        exit_code:
          type: integer
          format: int32
          nullable: true
        last_exit_code:
          type: integer
          format: int32
          nullable: true
        exit_signal:
          type: integer
          format: int32
          nullable: true
        reason:
          type: string
          nullable: true
        termination_reason:
          type: string
          nullable: true
        restart_count:
          type: integer
          format: int64
    PersistedServiceState:
      type: string
      enum: [queued, building, starting, warming, validating, unstable, crash_loop, oom_killed, healthy, failed]
    DeploymentLifecycleState:
      type: string
      enum: [queued, building, starting, warming, validating, unstable, crash_loop, oom_killed, promoted, rollback, failed, gc_eligible]
    PersistedValidationSummary:
      type: object
      properties:
        restart_count_initial: { type: integer, format: int64 }
        restart_count_current: { type: integer, format: int64 }
        restart_count_stable: { type: boolean }
        validation_succeeded: { type: boolean }
        last_probe_error:
          type: string
          nullable: true
        unstable_probe_failures: { type: integer, format: int32 }
        restart_storm_detected: { type: boolean }
