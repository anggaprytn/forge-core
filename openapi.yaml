openapi: 3.1.0
info:
  title: Forge Control Plane API
  version: 1.0.0
  description: Forge v1 single-node runtime convergence control plane API.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/tokens:
    get:
      summary: List CLI tokens visible to the authenticated principal
      description: Returns token metadata only. Plaintext token values are never returned.
      responses:
        '200':
          description: CLI token metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeTokenList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      summary: Create a new CLI token
      description: Issues a new CLI token signed with the current secret. The plaintext token is shown once in the response and is not stored server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenCreateRequest'
      responses:
        '200':
          description: Token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeTokenCreate'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/tokens/{token_id}:
    delete:
      summary: Revoke one CLI token
      parameters:
        - in: path
          name: token_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeTokenRevoke'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /healthz:
    get:
      summary: Health check
      description: Lightweight process liveness only. Verifies the daemon is running and responding.
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEnvelope'
  /readyz:
    get:
      summary: Readiness check
      description: Cache-backed control-plane readiness. Serves cached convergence state, startup phase, and degraded reasons in bounded time. It must not perform fleet scans, replay execution, or per-project health inspection on the request path.
      security: []
      responses:
        '200':
          description: Ready or degraded control-plane readiness
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessEnvelope'
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessEnvelope'
  /metrics:
    get:
      summary: Cached control-plane metrics
      description: Cache-backed JSON control-plane telemetry including startup phase, leadership, replay, cache age, dependency breaker, and split-brain detection fields. Request handling is bounded-time and does not trigger live Docker or Caddy scans.
      security: []
      responses:
        '200':
          description: Metrics JSON snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSnapshot'
  /api/github/repos:
    get:
      summary: List accessible GitHub repositories for the authenticated web session
      operationId: listGithubRepositories
      responses:
        '200':
          description: Accessible repositories for the current GitHub session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeGitHubRepoList'
        '401':
          description: Web session missing or GitHub authorization expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: GitHub integration unavailable or current session has no sealed GitHub token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects:
    post:
      summary: Create or update a project registry entry
      operationId: upsertProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpsertRequest'
      responses:
        '200':
          description: Project stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProject'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      summary: List registered projects
      operationId: listProjects
      responses:
        '200':
          description: Registered projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProjectList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/register-from-github/preview:
    post:
      summary: Preview project registration fields derived from a GitHub repository
      operationId: previewProjectRegistrationFromGithub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterProjectFromGitHubPreviewRequest'
      responses:
        '200':
          description: Derived project registration preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeRegisterProjectFromGitHubPreview'
        '400':
          description: Invalid repository URL or missing apps domain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing web session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/register-from-github:
    post:
      summary: Register a project from a GitHub repository without deployment
      operationId: registerProjectFromGithub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterProjectFromGitHubRequest'
      responses:
        '200':
          description: Project registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeRegisterProjectFromGitHub'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing web session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Project ID or base domain collision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}:
    get:
      summary: Get one registered project
      operationId: getProject
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/env:
    get:
      summary: Get masked environment inventory across development, staging, and production
      operationId: getProjectEnvInventory
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Masked environment inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEnvInventory'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/env/{environment}:
    get:
      summary: Get masked environment inventory for one environment
      operationId: getProjectEnvInventoryEnvironment
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Masked environment inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEnvInventory'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project or environment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/env/preview:
    post:
      summary: Preview masked environment changes without saving them
      operationId: postProjectEnvPreview
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvPreviewRequest'
      responses:
        '200':
          description: Preview-only masked environment diff
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEnvPreview'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/env/apply:
    post:
      summary: Apply validated masked environment changes for the next deployment
      operationId: postProjectEnvApply
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvApplyRequest'
      responses:
        '200':
          description: Masked environment changes saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEnvApply'
        '400':
          description: Invalid changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Stale preview, concurrent change, or idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/deploy/preview:
    post:
      summary: Preview a web deployment from the registered repository and git ref
      operationId: postProjectDeployPreview
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebDeployPreviewRequest'
      responses:
        '200':
          description: Deployment preflight result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeWebDeployPreview'
        '400':
          description: Invalid preview request or source resolution failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/deploy:
    post:
      summary: Revalidate and enqueue a deployment from the registered repository and git ref
      operationId: postProjectDeploy
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebDeployRequest'
      responses:
        '202':
          description: Deployment queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeWebDeploy'
        '400':
          description: Preview failed or deployment request invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/env/audit:
    get:
      summary: Get masked environment audit history
      operationId: getProjectEnvAudit
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Masked environment audit history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEnvAudit'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/environments/{environment}/status:
    get:
      summary: Get runtime status for one project environment
      operationId: getProjectEnvironmentStatus
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Environment runtime status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeProjectEnvironmentStatus'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project or environment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/environments/{environment}/diagnostics:
    get:
      summary: Get diagnostics for one project environment
      operationId: getProjectEnvironmentDiagnostics
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Environment diagnostics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEnvironmentDiagnostics'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project or environment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/environments/{environment}/deployments:
    get:
      summary: Get read-only deployment history for one project environment
      operationId: getProjectEnvironmentDeployments
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Read-only deployment history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentHistoryWebResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/environments/{environment}/generations:
    get:
      summary: Get read-only generation truth for one project environment
      operationId: getProjectEnvironmentGenerations
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Read-only generation truth
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeGenerationTruthResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/projects/{project_id}/environments/{environment}/backups:
    post:
      summary: Create a crash-consistent backup for the active generation
      operationId: createBackup
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupRecord'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Active generation or persistent volume not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      summary: List backups for one project environment
      operationId: listBackups
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
        - in: path
          name: environment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/backups/{backup_id}:
    get:
      summary: Inspect one backup manifest
      operationId: inspectBackup
      parameters:
        - in: path
          name: backup_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupRecord'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/backups/{backup_id}/restore:
    post:
      summary: Restore a backup into a new generation
      operationId: restoreBackup
      parameters:
        - in: path
          name: backup_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup restored into a new generation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeBackupRestore'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /deployments:
    post:
      summary: Enqueue a deployment operation
      operationId: createDeployment
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentRequest'
      responses:
        '202':
          description: Deployment accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Daemon not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /deployments/{id}:
    get:
      summary: Get deployment details
      operationId: getDeployment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deployment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentStatus'
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /logs/{id}:
    get:
      summary: Get logs for a deployment
      operationId: getDeploymentLogs
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bounded diagnostic logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDeploymentLogs'
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /events:
    get:
      summary: List events
      operationId: listEvents
      responses:
        '200':
          description: Recent events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeEventList'
  /secrets:
    post:
      summary: Create or update a secret
      operationId: postSecret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretWriteRequest'
      responses:
        '201':
          description: Secret stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeSecretWriteResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Secret store unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /webhooks/github:
    post:
      summary: GitHub Webhook endpoint
      security: []
      parameters:
        - in: header
          name: X-GitHub-Delivery
          required: true
          schema:
            type: string
        - in: header
          name: X-GitHub-Event
          required: true
          schema:
            type: string
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeWebhookResult'
        '400':
          description: Invalid request or signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    HealthEnvelope:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    ReadinessEnvelope:
      type: object
      required:
        - status
        - startup_phase
      properties:
        status:
          type: string
          example: ready
          description: Control-plane readiness status. Common values are ready, degraded, and not_ready.
        startup_phase:
          type: string
          example: leader_active
          description: Current daemon startup phase. Values are booting, replaying, leader_acquiring, follower, leader_active, or degraded.
        active_failure:
          type: boolean
          description: True when the current cached readiness state has an active unresolved blocker.
        reason:
          type:
            - string
            - 'null'
          example: readiness cache stale
        reasons:
          type: array
          items:
            $ref: '#/components/schemas/ReadyzReason'
    DependencyBreakerDiagnostics:
      type: object
      properties:
        state:
          type: string
        failure_count:
          type: integer
          format: int64
        last_success_unix:
          type:
            - integer
            - 'null'
          format: int64
        next_retry_unix:
          type:
            - integer
            - 'null'
          format: int64
        last_error:
          type:
            - string
            - 'null'
    MetricsDependencySnapshot:
      type: object
      properties:
        probe_latency_ms:
          type: integer
          format: int64
        breaker:
          $ref: '#/components/schemas/DependencyBreakerDiagnostics'
    ClusterDiagnostics:
      type: object
      properties:
        observed_nodes:
          type: integer
